<!DOCTYPE html>
<html>
<head>
    <style>
        body { text-align: center; padding: 50px; font-family: sans-serif; }
        button { padding: 15px 30px; font-size: 18px; background-color: #28a745; color: white; border: none; border-radius: 8px; margin: 5px; }
    </style>
</head>
<body>
    <h1>၂၀၂၆ ဘောလုံးခန့်မှန်းဂိမ်း</h1>
    <p>ဘယ်အသင်းနိုင်မလဲ ခန့်မှန်းပါ:</p>
    <button onclick="guess('Team A')">Team A နိုင်မည်</button>
    <button onclick="guess('Team B')">Team B နိုင်မည်</button>
    
    <p id="result"></p>

    <div style="margin-top: 30px;">
        <h3>ငွေသွင်းရန် (KPay/Wave):</h3>
        <p>09-XXXXXXXXXX သို့ ငွေလွှဲပြီး Screenshot ပို့ပေးပါ</p>
        <button style="background-color: #007bff;" onclick="window.location.href='https://t.me/Foodball2026'">ငွေလွှဲပြီးပြီ</button>
    </div>

    <script>
        function guess(team) {
            document.getElementById("result").innerHTML = "သင် " + team + " ကို ရွေးချယ်လိုက်ပါပြီ!";
        }
    </script>
</body>
</html>
